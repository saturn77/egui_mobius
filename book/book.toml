[book]
authors = ["James Bonanno"]
language = "en"
src = "src"
title = "egui-mobius && egui-citizen"
description = "A framework for clean, reusable architecture in egui apps — identities, reactive state, and message dispatch."

[output.html]
git-repository-url = "https://github.com/saturn77/egui_mobius"
edit-url-template = "https://github.com/saturn77/egui_mobius/edit/master/book/{path}"
default-theme = "navy"
preferred-dark-theme = "navy"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true
line-numbers = true

[rust]
edition = "2021"
